<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevSpace Smart Router</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">AgenticRouter</p>
        <h1>DevSpace Smart Router</h1>
        <p>Router uses rules only. No AI call is made.</p>
      </section>

      <section class="grid">
        <form id="route-form" class="panel">
          <label>
            Project
            <select id="project" name="project_name" required></select>
          </label>

          <label>
            Task description
            <textarea id="task" name="task_description" rows="5" required placeholder="Describe the task to route"></textarea>
          </label>

          <label>
            Files touched
            <textarea id="files" name="files_touched" rows="3" placeholder="One per line or comma-separated"></textarea>
          </label>

          <div class="split">
            <label>
              Session ID
              <input id="session-id" name="session_id" placeholder="optional">
            </label>

            <label>
              Routing profile
              <select id="profile" name="profile_name">
                <option value="balanced">balanced</option>
                <option value="cost_saver">cost_saver</option>
                <option value="max_savings">max_savings</option>
                <option value="quality_first">quality_first</option>
                <option value="max_quality">max_quality</option>
                <option value="claude_only">claude_only</option>
                <option value="codex_only">codex_only</option>
                <option value="safe_prod">safe_prod</option>
              </select>
            </label>
          </div>

          <label>
            Cost/quality tradeoff <span id="tradeoff-value">5</span>
            <input id="tradeoff" name="cost_quality_tradeoff" type="range" min="0" max="10" value="5">
          </label>

          <label>
            Allowed model pool
            <textarea id="allowed-models" name="allowed_models" rows="2" placeholder="Optional aliases or models, one per line"></textarea>
          </label>

          <div class="split">
            <label>
              Previous failures
              <input id="failures" name="previous_failure_count" type="number" min="0" value="0">
            </label>

            <label class="check">
              <input id="live-prod" name="live_prod" type="checkbox">
              Live/prod task
            </label>
          </div>

          <button type="submit">Route task</button>
        </form>

        <section class="panel exports-panel">
          <h2>Enterprise Exports</h2>
          <p>Safe placeholder templates for LiteLLM-style or internal gateway setup.</p>
          <div class="export-links">
            <a href="/exports/litellm/config.example.yaml" target="_blank">LiteLLM config template</a>
            <a href="/exports/gateway/routing_policy.example.yaml" target="_blank">Gateway routing policy</a>
            <a href="/exports/gateway/guardrails_policy.example.yaml" target="_blank">Guardrails policy</a>
            <a href="/exports/gateway/observability_policy.example.yaml" target="_blank">Observability policy</a>
          </div>
        </section>

        <section id="result" class="panel result empty">
          <div class="placeholder">Run a task to see the recommendation.</div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
